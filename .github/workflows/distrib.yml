name: distrib
on:
  workflow_call:
    inputs:
      ai_devices:
        description: "JSON array of devices"
        type: string
        default: '["cpu","cuda","xpu"]'
        required: false
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true
      container_registry:
        description: "Container registry for the docker images"
        type: string
        default: "ghcr.io/open-edge-platform"
        required: false
      image_tag_suffix:
        description: "Suffix to append to the image tag (e.g. -dev, -nightly)"
        type: string
        default: ""
        required: false
      push_images:
        description: "Push and sign docker images to GHCR"
        type: boolean
        default: false
        required: false
      sha-commit:
        description: "SHA to checkout"
        type: string
        default: ""
        required: false
  workflow_dispatch:
    inputs:
      ai_devices:
        description: "JSON array of devices"
        type: string
        default: '["cpu","cuda","xpu"]'
        required: false
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true
      container_registry:
        description: "Container registry for the docker images"
        type: string
        default: "ghcr.io/open-edge-platform"
        required: false
      image_tag_suffix:
        description: "Suffix to append to the image tag (e.g. -dev, -nightly)"
        type: string
        default: "-dev"
        required: false

permissions: {} # No permissions by default

jobs:
  component-check:
    name: Distrib workflow
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permission to push packages to GHCR
      id-token: write # Permission to request OIDC token for signing images
    timeout-minutes: 30
    strategy:
      matrix:
        ai-device: ${{ fromJson(inputs.ai_devices) }}
    env:
      BUILD_VERSION: ${{ inputs.build_version }}
      DEVICE: ${{ matrix.ai-device }}
      CONTAINER_REGISTRY: ${{ inputs.container_registry }}
      IMAGE_TAG_SUFFIX: ${{ inputs.image_tag_suffix }}
    steps:
      - name: Construct image name
        run: |
          IMAGE_NAME="${CONTAINER_REGISTRY}/instant-learn-${DEVICE}:${BUILD_VERSION}${IMAGE_TAG_SUFFIX}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Validate SHA format
        if: inputs.sha-commit != ''
        env:
          SHA_COMMIT: ${{ inputs.sha-commit }}
        run: |
          if ! echo "${SHA_COMMIT}" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Error: Invalid SHA format. Expected 40 hexadecimal characters."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.sha-commit || '' }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "application/backend/uv.lock"
          cleanup-runner: "true"

      - name: Build docker image for ${{ matrix.ai-device }}
        working-directory: application
        run: |
          just \
            build-target="${DEVICE}" \
            version="${BUILD_VERSION}" \
            image-name="${IMAGE_NAME}" \
            docker-build-context="--no-cache" \
            build-image

      - name: Show size of the image for ${{ matrix.ai-device }}
        working-directory: application
        run: |
          just \
            build-target="${DEVICE}" \
            version="${BUILD_VERSION}" \
            image-name="${IMAGE_NAME}" \
            show-size

      - name: Test image for ${{ matrix.ai-device }}
        working-directory: application
        run: |
          just \
            build-target="${DEVICE}" \
            version="${BUILD_VERSION}" \
            image-name="${IMAGE_NAME}" \
            test-image

      - name: Log in to GHCR
        if: inputs.push_images
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image for ${{ matrix.ai-device }}
        if: inputs.push_images
        working-directory: application
        run: |
          docker push "${IMAGE_NAME}"

      - name: Sign image for ${{ matrix.ai-device }}
        if: inputs.push_images
        uses: open-edge-platform/geti-ci/actions/sign-image@e80098b3d180db37914f11ff6021f9fa34d0bb9f
        with:
          image-uri: ${{ env.IMAGE_NAME }}
