name: distrib
on:
  workflow_call:
    inputs:
      ai_devices:
        description: "JSON array of devices"
        type: string
        default: '["cpu","cuda","xpu"]'
        required: false
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true
      image_name_prefix:
        description: "Base name for the docker images (without tag)"
        type: string
        default: "ghcr.io/open-edge-platform/instant-learn-dev"
        required: false
      push_images:
        description: "Push and sign docker images to GHCR"
        type: boolean
        default: false
        required: false
      sha-commit:
        description: "SHA to checkout"
        type: string
        default: ""
        required: false
  workflow_dispatch:
    inputs:
      ai_devices:
        description: "JSON array of devices"
        type: string
        default: '["cpu","cuda","xpu"]'
        required: false
      build_version:
        description: "Specifies the build version to apply to all binaries produced by this workflow"
        type: string
        required: true

permissions: {} # No permissions by default

jobs:
  component-check:
    name: Distrib workflow
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permission to push packages to GHCR
      id-token: write # Permission to request OIDC token for signing images
    timeout-minutes: 30
    strategy:
      matrix:
        ai-device: ${{ fromJson(inputs.ai_devices) }}
    env:
      BUILD_VERSION: ${{ inputs.build_version }}
      DEVICE: ${{ matrix.ai-device }}
      IMAGE_NAME_PREFIX: ${{ inputs.image_name_prefix }}
    steps:
      - name: Validate SHA format
        if: inputs.sha-commit != ''
        env:
          SHA_COMMIT: ${{ inputs.sha-commit }}
        run: |
          if ! echo "${SHA_COMMIT}" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Error: Invalid SHA format. Expected 40 hexadecimal characters."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.sha-commit || '' }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "application/backend/uv.lock"
          cleanup-runner: "true"

      - name: Build docker image for ${{ matrix.ai-device }}
        working-directory: application
        run: |
          just \
            build-target="${DEVICE}" \
            version="${BUILD_VERSION}" \
            image-name="${IMAGE_NAME_PREFIX}-${DEVICE}:${BUILD_VERSION}" \
            docker-build-context="--no-cache" \
            build-image

      - name: Show size of the image for ${{ matrix.ai-device }}
        working-directory: application
        run: |
          just \
            build-target="${DEVICE}" \
            version="${BUILD_VERSION}" \
            image-name="${IMAGE_NAME_PREFIX}-${DEVICE}:${BUILD_VERSION}" \
            show-size

      - name: Test image for ${{ matrix.ai-device }}
        working-directory: application
        run: |
          just \
            build-target="${DEVICE}" \
            version="${BUILD_VERSION}" \
            image-name="${IMAGE_NAME_PREFIX}-${DEVICE}:${BUILD_VERSION}" \
            test-image

      - name: Log in to GHCR
        if: inputs.push_images
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image for ${{ matrix.ai-device }}
        if: inputs.push_images
        run: |
          IMAGE_NAME="${IMAGE_NAME_PREFIX}-${DEVICE}:${BUILD_VERSION}"
          docker push "${IMAGE_NAME}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Sign image for ${{ matrix.ai-device }}
        if: inputs.push_images
        uses: open-edge-platform/geti-ci/actions/sign-image@375de2eb018dae396c959f9b3a464f40271de969
        with:
          image-uri: ${{ env.IMAGE_NAME }}
