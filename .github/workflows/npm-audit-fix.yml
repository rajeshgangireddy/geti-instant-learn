name: NPM Audit Fix

on:
  schedule:
    - cron: "0 3 2,16 * *"
  workflow_dispatch:
    inputs:
      force_fix:
        description: "Run npm audit fix --force (includes breaking changes)"
        required: false
        default: false
        type: boolean
permissions: {} # No permissions by default on workflow level

jobs:
  npm-audit-fix:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: application/ui/.nvmrc

      - name: Install dependencies
        working-directory: application/ui
        run: npm ci

      - name: Display audit report
        working-directory: application/ui
        continue-on-error: true
        run: |
          npm audit || true

      - name: Run npm audit fix (safe mode)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.force_fix != 'true' }}
        working-directory: application/ui
        continue-on-error: true
        run: npm audit fix --package-lock-only || echo "Some issues could not be auto-fixed"

      - name: Run npm audit fix (force mode)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_fix == 'true' }}
        working-directory: application/ui
        continue-on-error: true
        run: npm audit fix --force || true

      - name: Check for changes
        id: check-changes
        working-directory: application/ui
        run: |
          if git diff --quiet package-lock.json package.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # GitHub App token is required to trigger other workflows (GITHUB_TOKEN cannot trigger workflows)
      - name: Get token
        if: steps.check-changes.outputs.changed == 'true'
        id: get-github-app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PEM }}

      - name: Create PR if lockfile changed
        if: steps.check-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          BRANCH_NAME: "npm-audit-fix-${{ github.run_id }}"
          IS_FORCE: ${{ github.event.inputs.force_fix == 'true' }}
          # Feature freeze control: set RENOVATE_AUTOMERGE_ENABLED repository variable to 'false' to disable automerge
          AUTOMERGE_ENABLED: ${{ vars.RENOVATE_AUTOMERGE_ENABLED != 'false' }}
        run: |
          git config user.name "oep-renovate[bot]"
          git config user.email "212772560+oep-renovate[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add application/ui/package-lock.json application/ui/package.json

          if [ "$IS_FORCE" = "true" ]; then
            PR_TITLE="fix(deps): npm audit fixes with breaking changes [security]"
            PR_BODY=$(cat <<EOF
          **This PR includes breaking changes**

          This PR was automatically created to update NPM dependencies with:
          \`npm audit fix --force\`

          Please review carefully as this may include major version updates.
          EOF
          )
            git commit -s -m "fix(deps): npm audit fixes with breaking changes [security]"
          else
            PR_TITLE="fix(deps): npm audit fixes (safe mode) [security]"
            PR_BODY=$(cat <<EOF
          **Lockfile-only audit remediation**

          This PR was automatically created to update NPM dependencies with:
          \`npm audit fix --package-lock-only\`

          This updates the lockfile based on audit remediation and should be reviewed for any dependency changes.
          EOF
          )
            git commit -s -m "fix(deps): npm audit fixes (safe mode) [security]"
          fi

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$BRANCH_NAME"

          if [ "$IS_FORCE" = "true" ]; then
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH_NAME"
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH_NAME" \
              --reviewer sys-geti
            
            # Enable auto-merge for safe mode PRs (if not disabled via env)
            if [ "$AUTOMERGE_ENABLED" = "true" ]; then
              gh pr merge "$BRANCH_NAME" --auto --squash --delete-branch
            fi
          fi
